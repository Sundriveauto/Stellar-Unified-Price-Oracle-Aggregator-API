name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: oracle
          POSTGRES_PASSWORD: oracle
          POSTGRES_DB: oracle_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://oracle:oracle@localhost:5432/oracle_test
      API_KEY: test-key
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            api/package-lock.json
            aggregator/package-lock.json

      - name: Install shared deps
        run: cd shared && npm install

      - name: Install API deps
        run: cd api && npm install

      - name: Install aggregator deps
        run: cd aggregator && npm install

      - name: Build shared
        run: cd shared && npx tsc --noEmit 2>/dev/null || true

      - name: Lint API
        run: cd api && npm run lint

      - name: Lint aggregator
        run: cd aggregator && npm run lint

      - name: Test API
        run: cd api && npm test

      - name: Test aggregator
        run: cd aggregator && npm test
